version: "3.9"

services:
  electrofrig_parser:
    build: .
    container_name: electrofrig_parser

    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./data:/app/data

    environment:
      - LOG_FILE=/app/logs/electrofrig.log
      - API_URL=http://host.docker.internal:8010/api/products/import/

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
