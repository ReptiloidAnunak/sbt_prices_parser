           class="addlink export-btn">
            Скачать Excel поставщиков
        </a>
    </li>
    {{ block.super }}
{% endblock %}

{% block extrahead %}
{{ block.super }}
<style>
/* базовый цвет */
.export-btn {
    background-color: #1b9b12 !important;

}

/* hover */
.export-btn:hover {
    background-color: #157d0e !important;
    border-color: #157d0e !important;
}

/* active (при нажатии) */
.export-btn:active {
    background-color: #10640b !important;
    border-color: #10640b !important;
}
</style>
{% endblock %}
